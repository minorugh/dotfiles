# ポート8081: IPアドレス直打ち用（Tailscale経由のスマホ確認用）
# http://100.x.x.x:8080/ → gospel-haiku.com
# http://100.x.x.x:8081/ → minorugh.com
<VirtualHost *:8081>
    ServerName minorugh.local
    DocumentRoot /var/www/html/minorugh.com/public_html
