services:
  postgres:
    image: postgres:alpine
    container_name: mattermost-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=mattermost
      - POSTGRES_PASSWORD=mattermost
      - POSTGRES_DB=mattermost
      - PGDATA=/var/lib/postgresql/data
    volumes:
      - /home/minoru/Docker/mattermost/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mattermost -d mattermost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mattermost:
    image: mattermost/mattermost-team-edition:latest
    container_name: mattermost
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - MM_SQLSETTINGS_DRIVERNAME=postgres
      - MM_SQLSETTINGS_DATASOURCE=postgres://mattermost:mattermost@postgres/mattermost?sslmode=disable&connect_timeout=10
      - MM_EMAILSETTINGS_SMTPSERVER=smtp.gmail.com
      - MM_EMAILSETTINGS_SMTPPORT=587
      - MM_EMAILSETTINGS_SMTPUSERNAME=minorugh@gmail.com
      - MM_EMAILSETTINGS_SMTPPASSWORD=lgtmybepfxbjbvsh
      - MM_EMAILSETTINGS_CONNECTIONSECURITY=STARTTLS
      - MM_EMAILSETTINGS_SENDEMAILFROM=minorugh@gmail.com
      - MM_EMAILSETTINGS_ENABLESMTPAUTH=true
    ports:
      - "8065:8065"
    volumes:
      - /home/minoru/Docker/mattermost/data:/mattermost/data
      - /home/minoru/Docker/mattermost/logs:/mattermost/logs
      - /home/minoru/Docker/mattermost/config:/mattermost/config
      - /home/minoru/Docker/mattermost/plugins:/mattermost/plugins
