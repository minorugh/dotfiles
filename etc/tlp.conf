# TLP configuration for ThinkPad P1 / x250 (Debian12)
# Managed via dotfiles — symlinked from ~/src/github.com/minorugh/dotfiles/etc/tlp.conf
#
# 常時AC接続運用のため充電量を抑えてバッテリー劣化を防ぐ。
# 変更する場合は dotfiles/cron/Makefile の bat-set-60 / bat-set-80 を使うこと。
# （sed で直接書き換えるため、シンボリックリンク先のこのファイルが更新される）
#
# BAT1 は x250 (Ultrabay) 用。P1 には BAT1 が存在しないため無視される。

START_CHARGE_THRESH_BAT0=40
STOP_CHARGE_THRESH_BAT0=60

START_CHARGE_THRESH_BAT1=40
STOP_CHARGE_THRESH_BAT1=60
